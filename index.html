<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Sticky Board</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Patrick+Hand&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-shapes" aria-hidden="true">
      <span class="shape shape-a"></span>
      <span class="shape shape-b"></span>
      <span class="shape shape-c"></span>
    </div>

    <main class="app-shell">
      <header class="top-bar">
        <div>
          <p class="kicker">Focus Planner</p>
          <h1>Daily Sticky Board</h1>
          <p id="todayLabel" class="today-label"></p>
          <p id="periodLabel" class="period-label"></p>
        </div>
        <div class="top-actions">
          <button id="dayViewBtn" class="view-btn active" type="button">Day</button>
          <button id="weekViewBtn" class="view-btn" type="button">Week (Mon-Fri)</button>
          <button id="monthViewBtn" class="view-btn" type="button">Month</button>
        </div>
      </header>

      <section class="controls" aria-label="Date controls">
        <button id="prevBtn" class="nav-btn" type="button">Previous</button>
        <div class="date-pick-wrap">
          <label for="datePicker">Jump to date</label>
          <input id="datePicker" type="date" />
        </div>
        <button id="nextBtn" class="nav-btn" type="button">Next</button>
      </section>

      <section id="board" class="board"></section>

      <footer class="footer">
        <p>
          Auto-saved in your browser. Real-time sync works across open tabs on the same browser.
        </p>
      </footer>
    </main>

    <template id="dayCardTemplate">
      <article class="sticky-card" data-date="">
        <header class="card-header">
          <h2></h2>
          <span class="task-count"></span>
        </header>

        <div class="add-task-row">
          <input type="text" class="task-input" placeholder="Add task..." maxlength="120" />
          <button class="add-task-btn" type="button">Add</button>
          <button class="voice-btn" type="button" title="Add task by voice">Voice</button>
        </div>

        <p class="voice-status" aria-live="polite"></p>

        <ul class="task-list" aria-live="polite"></ul>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
